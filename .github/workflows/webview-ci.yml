name: Webview CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: webview-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint without warnings
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build and enforce bundle budget
        run: npm run build
